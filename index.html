<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulasi Titrasi Lab Kimia</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0; padding: 0; background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; font-family: 'Lexend', sans-serif;
            user-select: none;
        }
        #game-container { 
            position: relative; width: 100vw; max-width: 100%; 
            aspect-ratio: 16 / 9; max-height: 100vh; background-color: #000; 
            margin: auto; box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        canvas { 
            width: 100%; height: 100%; display: block; 
            object-fit: contain; image-rendering: pixelated; 
            touch-action: none; /* Mencegah layar scroll di HP */
        }
        
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center; gap: 15px; z-index: 10;
        }
        
        .menu-btn {
            font-family: 'Lexend', sans-serif; font-size: 1.2rem; font-weight: 600;
            padding: 10px 20px; background-color: #888888; color: white;
            border: 2px solid #555555; border-radius: 8px; cursor: pointer; width: 250px; text-align: center;
        }
        .menu-btn:hover { background-color: #a0a0a0; }
        .menu-btn:active { transform: scale(0.95); }

        #overfill-popup { position: relative; display: flex; flex-direction: column; align-items: center; }
        #overfill-img { width: 60%; min-width: 300px; image-rendering: pixelated; }
        #btn-ulangi { position: absolute; bottom: 12%; width: 45%; height: 25%; opacity: 0; cursor: pointer; }
        
        #alert-msg {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            background: rgba(255,50,50,0.9); color: white; padding: 5px 15px;
            border-radius: 5px; font-size: 0.8rem; display: none; pointer-events: none; z-index: 5;
        }
        #loading-text {
            position: absolute; color: white; font-size: 1.5rem; 
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="256" height="144"></canvas>
        <div id="loading-text">Memuat Aset... 0%</div>
        <div id="alert-msg">Pesan Notifikasi</div>
        
        <div id="menu-overlay" class="overlay">
            <button class="menu-btn" id="btn-keluar">Keluar</button>
            <button class="menu-btn" id="btn-lanjut">Lanjutkan Simulasi</button>
        </div>

        <div id="overfill-overlay" class="overlay">
            <div id="overfill-popup">
                <img src="popupg.png" id="overfill-img" alt="Overfill">
                <button id="btn-ulangi"></button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const alertMsg = document.getElementById('alert-msg');
        const loadingText = document.getElementById('loading-text');

        const images = {};
        const sources = {
            bg: 'kanvasmeja.png', ui: 'tombolmenu.png', popupg: 'popupg.png',
            b_closed: 'bit.png', b_open: 'bib.png', b_empty: 'bkb.png',
            p0: 'pv0.png', p1: 'pv1.png', p2: 'pv2.png', p3: 'pv3.png', p4: 'pv4.png', p5: 'pv5.png',
            l: 'l.png', la: 'la.png', laa: 'laa.png', laaa: 'laaa.png', laaaa: 'laaaa.png',
            lb: 'lb.png', lbb: 'lbb.png', lbbb: 'lbbb.png', lbbbb: 'lbbbb.png',
            lab: 'lab.png', laabb: 'laabb.png',
            ppb: 'ppb.png', ppp: 'ppp.png', pppb: 'pppb.png'
        };

        let loadedImages = 0;
        const totalImages = Object.keys(sources).length;

        for (let key in sources) {
            images[key] = new Image();
            images[key].src = sources[key];
            images[key].onload = () => { 
                loadedImages++; 
                loadingText.innerText = `Memuat Aset... ${Math.floor((loadedImages/totalImages)*100)}%`;
                if (loadedImages === totalImages) {
                    loadingText.style.display = 'none'; draw(); 
                }
            };
        }

        // --- STATE GAME & UKURAN OBJEK (Disesuaikan untuk Aset Cropped) ---
        // Jika gambarmu terlihat kebesaran/kekecilan, cukup ubah angka 'w' (lebar) dan 'h' (tinggi) di bawah ini!
        let bottles, pipettes, flask, indicator, uiBtn;

        function initGame() {
            // Lebar (w) 32px, Tinggi (h) 50px
            bottles = [
                { id: 'A', x: 45, y: 80, w: 32, h: 50, state: 'closed', capacity: 5 },
                { id: 'B', x: 85, y: 80, w: 32, h: 50, state: 'closed', capacity: 5 }
            ];

            // Lebar 36px, Tinggi 45px
            flask = { x: 135, y: 85, w: 36, h: 45, a: 0, b: 0, hasIndicator: false };

            // Indikator
            indicator = {
                x: 185, y: 80, w: 24, h: 50, // Ukuran utuh botol PP
                cap_x: 185, cap_y: 80, cap_w: 24, cap_h: 24, // Ukuran tutup yang ditarik
                isDetached: false, location: 'base'
            };

            // Pipet (Lebar 16px, Tinggi 100px)
            pipettes = [
                { id: 1, x: 10, y: 15, base_x: 10, base_y: 15, w: 16, h: 100, capacity: 0, tag: 'netral', location: 'rack' },
                { id: 2, x: 28, y: 15, base_x: 28, base_y: 15, w: 16, h: 100, capacity: 0, tag: 'netral', location: 'rack' }
            ];

            // Tombol UI Menu (Pojok kanan atas)
            uiBtn = { x: 236, y: 2, w: 18, h: 18 }; 
        }

        initGame();

        let draggedObj = null; let dragType = null;
        let dragOffsetX = 0, dragOffsetY = 0;

        // --- FUNGSI RENDER UTAMA ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background mengisi penuh kanvas 256x144
            ctx.drawImage(images.bg, 0, 0, canvas.width, canvas.height);

            // 1. Gambar Botol
            bottles.forEach(b => {
                let img = images.b_closed;
                if (b.state === 'open') img = b.capacity > 0 ? images.b_open : images.b_empty;
                ctx.drawImage(img, b.x, b.y, b.w, b.h);
            });

            // 2. Gambar Labu
            ctx.drawImage(getFlaskSprite(), flask.x, flask.y, flask.w, flask.h);

            // 3. Gambar Indikator PP
            if (indicator.isDetached) {
                // Gambar bagian botol bawah
                ctx.drawImage(images.ppb, indicator.x, indicator.y + (indicator.h - indicator.h*0.6), indicator.w, indicator.h*0.6); 
                // Gambar tutup yang sedang ditarik
                ctx.drawImage(images.ppp, indicator.cap_x, indicator.cap_y, indicator.cap_w, indicator.cap_h); 
            } else {
                ctx.drawImage(images.pppb, indicator.x, indicator.y, indicator.w, indicator.h); 
            }

            // 4. Gambar Pipet
            pipettes.forEach(p => {
                let pImg = images['p' + p.capacity];
                ctx.drawImage(pImg, p.x, p.y, p.w, p.h);
            });

            // 5. Gambar UI (Hanya gambar menu yang dimunculkan ukurannya)
            ctx.drawImage(images.ui, uiBtn.x, uiBtn.y, uiBtn.w, uiBtn.h * 2);

            requestAnimationFrame(draw);
        }

        function getFlaskSprite() {
            let total = flask.a + flask.b;
            if (total === 0) return images.l;
            if (!flask.hasIndicator) {
                if (total === 1) return images.la; if (total === 2) return images.laa;
                if (total === 3) return images.laaa; if (total === 4) return images.laaaa;
            } else {
                if (flask.a === flask.b) { 
                    if (total === 2) return images.lab; if (total === 4) return images.laabb;
                } else if (flask.a > flask.b) {
                    if (total === 1) return images.la; if (total === 2) return images.laa;
                    if (total === 3) return images.laaa; if (total === 4) return images.laaaa;
                } else {
                    if (total === 1) return images.lb; if (total === 2) return images.lbb;
                    if (total === 3) return images.lbbb; if (total === 4) return images.lbbbb;
                }
            }
            return images.l; 
        }

        // --- FUNGSI DETEKSI KOORDINAT ---
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = 256 / rect.width; const scaleY = 144 / rect.height;
            let cx = e.clientX, cy = e.clientY;
            if(e.touches && e.touches.length > 0) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
            return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
        }

        function isHit(mx, my, ox, oy, ow, oh) {
            return mx >= ox && mx <= ox + ow && my >= oy && my <= oy + oh;
        }

        function showToast(msg) {
            alertMsg.innerText = msg; alertMsg.style.display = 'block';
            setTimeout(() => { alertMsg.style.display = 'none'; }, 2000);
        }

        // --- LOGIKA INTERAKSI (DRAG, DROP & KLIK) ---
        function handleStart(e) {
            if(e.cancelable) e.preventDefault();
            const pos = getPos(e); const mx = pos.x, my = pos.y;

            // UI Menu
            if (isHit(mx, my, uiBtn.x, uiBtn.y, uiBtn.w, uiBtn.h)) {
                document.getElementById('menu-overlay').style.display = 'flex'; return;
            }

            // Pipet
            for (let i = pipettes.length - 1; i >= 0; i--) {
                let p = pipettes[i];
                if (isHit(mx, my, p.x, p.y, p.w, p.h)) {
                    if (my <= p.y + 30) { // Area Bulb pencetan (30px teratas)
                        handlePipetteBulb(p); return;
                    } else { 
                        draggedObj = p; dragType = 'pipette';
                        dragOffsetX = mx - p.x; dragOffsetY = my - p.y; return;
                    }
                }
            }

            // Indikator
            let cX = indicator.isDetached ? indicator.cap_x : indicator.x;
            let cY = indicator.isDetached ? indicator.cap_y : indicator.y;
            if (isHit(mx, my, cX, cY, indicator.cap_w, indicator.cap_h)) {
                if (indicator.location === 'flask' && my <= cY + 15) {
                    flask.hasIndicator = true; showToast("Indikator diteteskan!");
                } else {
                    indicator.isDetached = true; draggedObj = indicator; dragType = 'indicator';
                    dragOffsetX = mx - indicator.cap_x; dragOffsetY = my - indicator.cap_y;
                } return;
            }

            // Botol
            bottles.forEach(b => {
                if (isHit(mx, my, b.x, b.y, b.w, b.h)) {
                    b.state = (b.state === 'closed') ? 'open' : 'closed';
                }
            });
        }

        function handleMove(e) {
            if (!draggedObj) return;
            if(e.cancelable) e.preventDefault();
            const pos = getPos(e);
            if (dragType === 'pipette') {
                draggedObj.x = pos.x - dragOffsetX; draggedObj.y = pos.y - dragOffsetY;
            } else if (dragType === 'indicator') {
                draggedObj.cap_x = pos.x - dragOffsetX; draggedObj.cap_y = pos.y - dragOffsetY;
            }
        }

        function handleEnd(e) {
            if (!draggedObj) return;
            if(e.cancelable) e.preventDefault();
            let dropped = false;

            if (dragType === 'pipette') {
                let p = draggedObj;
                let tipX = p.x + p.w / 2; let tipY = p.y + p.h; // Ujung bawah pipet

                // Cek jatuhkan ke botol
                for (let b of bottles) {
                    if (isHit(tipX, tipY, b.x, b.y, b.w, b.h)) {
                        if (p.tag === 'netral' || p.tag === b.id) {
                            p.x = b.x + (b.w/2) - (p.w/2); p.y = b.y - p.h + 20; 
                            p.location = b.id; dropped = true; break;
                        }
                    }
                }
                
                // Cek jatuhkan ke labu
                if (!dropped && isHit(tipX, tipY, flask.x, flask.y, flask.w, flask.h)) {
                    p.x = flask.x + (flask.w/2) - (p.w/2); p.y = flask.y - p.h + 25; 
                    p.location = 'flask'; dropped = true;
                }

                // Tumpah ke meja
                if (!dropped) {
                    if (p.capacity > 0) { p.capacity = 0; showToast("Cairan tumpah!"); }
                    p.x = p.base_x; p.y = p.base_y; p.location = 'rack';
                }
            } 
            else if (dragType === 'indicator') {
                let ind = draggedObj;
                let tipX = ind.cap_x + ind.cap_w / 2; let tipY = ind.cap_y + ind.cap_h;
                
                if (isHit(tipX, tipY, flask.x, flask.y, flask.w, flask.h)) {
                    ind.cap_x = flask.x + (flask.w/2) - (ind.cap_w/2); ind.cap_y = flask.y - ind.cap_h + 10;
                    ind.location = 'flask';
                } else {
                    ind.isDetached = false; ind.location = 'base';
                }
            }
            draggedObj = null; dragType = null;
        }

        function handlePipetteBulb(p) {
            let bottle = bottles.find(b => b.id === p.location);
            if (bottle) {
                if (bottle.state !== 'open') { showToast("Buka botol dulu!"); return; }
                if (bottle.capacity > 0 && p.capacity < 5) {
                    p.capacity++; bottle.capacity--; p.tag = bottle.id; 
                }
            } else if (p.location === 'flask') {
                if (p.capacity > 1) { 
                    if (flask.a + flask.b >= 4) {
                        document.getElementById('overfill-overlay').style.display = 'flex'; return;
                    }
                    p.capacity--;
                    if (p.tag === 'A') flask.a++; else if (p.tag === 'B') flask.b++;
                }
            }
        }

        // Event Listener
        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);

        canvas.addEventListener('touchstart', handleStart, {passive: false});
        canvas.addEventListener('touchmove', handleMove, {passive: false});
        canvas.addEventListener('touchend', handleEnd, {passive: false});

        // Tombol Pop-up
        document.getElementById('btn-lanjut').addEventListener('click', () => { document.getElementById('menu-overlay').style.display = 'none'; });
        document.getElementById('btn-keluar').addEventListener('click', () => { alert("Keluar dari simulasi..."); });
        document.getElementById('btn-ulangi').addEventListener('click', () => { initGame(); document.getElementById('overfill-overlay').style.display = 'none'; });

    </script>
</body>
</html>
